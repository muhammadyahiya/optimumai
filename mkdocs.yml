site_name: OptimumAI
site_description: Unlock the math behind AI — run any operation with explain=True.
site_url: https://muhammadyahiya.github.io/optimumai/
repo_url: https://github.com/muhammadyahiya/optimumai
repo_name: muhammadyahiya/optimumai

theme:
  name: material
  palette:
    - scheme: default
      primary: indigo
      accent: deep orange
      toggle:
        icon: material/weather-night
        name: Dark mode
    - scheme: slate
      primary: indigo
      accent: deep orange
      toggle:
        icon: material/weather-sunny
        name: Light mode
  features:
    - navigation.sections
    - navigation.top
    - content.code.copy
    - search.suggest

markdown_extensions:
  - admonition
  - pymdownx.highlight
  - pymdownx.superfences
  - toc:
      permalink: true

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          options:
            docstring_style: google
            show_root_heading: true
            show_source: false
            members_order: source

nav:
  - Home: index.md
  - Quickstart: quickstart.md
  - Features: features.md
  - Learn the tools:
      - NumPy: learn-numpy.md
      - matplotlib: learn-matplotlib.md
      - PyTorch: learn-pytorch.md
      - LLM fine-tuning: learn-finetuning.md
  - Learning path: course.md
  - GPU kernels: gpu-kernels.md
  - Visualization & circuits: visualization.md
  - Classical AI, ML & RL: classical-ai.md
  - Interactive & explained: interactive.md
  - Token generation: generation.md
  - Deploy the dashboard: deploy.md
  - CLI reference: cli.md
  - API reference: api.md
  - API stability: stability.md
